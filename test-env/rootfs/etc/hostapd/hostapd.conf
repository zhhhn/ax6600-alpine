# Hostapd configuration for JDCloud AX6600
# 2.4GHz interface

interface=wlan0
bridge=br-lan
driver=nl80211

# SSID
ssid=AX6600-2.4G

# Country code
country_code=CN

# 802.11b/g/n
hw_mode=g
channel=6

# Enable 802.11n
ieee80211n=1
ht_capab=[HT40+][SHORT-GI-20][SHORT-GI-40][TX-STBC][RX-STBC1]

# Security
wpa=2
wpa_passphrase=12345678
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP

# Logging
logger_syslog=-1
logger_syslog_level=2
logger_stdout=-1
logger_stdout_level=2

# Misc
ctrl_interface=/var/run/hostapd
dtim_period=2
beacon_int=100

# Disable legacy 802.11b rates
# disable_ht40=0
# require_ht=0
