# Hostapd configuration for JDCloud AX6600
# 5GHz interface

interface=wlan1
bridge=br-lan
driver=nl80211

# SSID
ssid=AX6600-5G

# Country code
country_code=CN

# 802.11a/n/ac/ax
hw_mode=a
channel=149
vht_oper_chwidth=1
vht_oper_centr_freq_seg0_idx=155

# Enable 802.11ac
ieee80211ac=1
vht_capab=[MAX-AMSDU-7935][SHORT-GI-80][TX-STBC-2BY1][RX-STBC-1][SU-BEAMFORMEE]

# Enable 802.11ax (WiFi 6)
ieee80211ax=1
he_su_beamformer=1
he_su_beamformee=1

# Security
wpa=2
wpa_passphrase=12345678
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP

# Logging
logger_syslog=-1
logger_syslog_level=2
logger_stdout=-1
logger_stdout_level=2

# Misc
ctrl_interface=/var/run/hostapd
dtim_period=2
beacon_int=100
