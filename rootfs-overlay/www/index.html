<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AX6600 管理面板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e; color: #eee; min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px; margin-bottom: 20px; border-radius: 10px;
        }
        header h1 { font-size: 24px; margin-bottom: 5px; }
        header p { opacity: 0.8; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { 
            background: #16213e; border-radius: 10px; padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card h2 { 
            font-size: 16px; color: #667eea; margin-bottom: 15px;
            border-bottom: 1px solid #333; padding-bottom: 10px;
        }
        .stat { display: flex; justify-content: space-between; margin: 10px 0; }
        .stat-label { color: #888; }
        .stat-value { font-weight: bold; }
        .progress { 
            background: #333; border-radius: 5px; height: 8px; 
            overflow: hidden; margin-top: 5px;
        }
        .progress-bar { 
            height: 100%; background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }
        .btn { 
            background: #667eea; border: none; color: white; padding: 10px 20px;
            border-radius: 5px; cursor: pointer; margin: 5px;
        }
        .btn:hover { opacity: 0.9; }
        .btn-danger { background: #e74c3c; }
        .btn-success { background: #27ae60; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #667eea; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav a { 
            color: #667eea; text-decoration: none; padding: 10px 15px;
            background: #16213e; border-radius: 5px;
        }
        .nav a:hover, .nav a.active { background: #667eea; color: white; }
        .refresh { float: right; color: #667eea; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ JDCloud AX6600</h1>
            <p>Alpine Linux 管理面板</p>
        </header>
        
        <nav class="nav">
            <a href="/" class="active">状态</a>
            <a href="/cgi-bin/network.cgi">网络</a>
            <a href="/cgi-bin/wifi.cgi">WiFi</a>
            <a href="/cgi-bin/firewall.cgi">防火墙</a>
            <a href="/cgi-bin/system.cgi">系统</a>
        </nav>
        
        <div class="grid">
            <div class="card">
                <h2>📊 系统状态</h2>
                <span class="refresh" onclick="location.reload()">🔄 刷新</span>
                <div class="stat">
                    <span class="stat-label">运行时间</span>
                    <span class="stat-value" id="uptime">加载中...</span>
                </div>
                <div class="stat">
                    <span class="stat-label">CPU 使用率</span>
                    <span class="stat-value" id="cpu">--</span>
                </div>
                <div class="progress"><div class="progress-bar" id="cpu-bar" style="width: 0%"></div></div>
                <div class="stat">
                    <span class="stat-label">内存使用</span>
                    <span class="stat-value" id="memory">--</span>
                </div>
                <div class="progress"><div class="progress-bar" id="memory-bar" style="width: 0%"></div></div>
            </div>
            
            <div class="card">
                <h2>🌐 网络状态</h2>
                <div class="stat">
                    <span class="stat-label">WAN IP</span>
                    <span class="stat-value" id="wan-ip">--</span>
                </div>
                <div class="stat">
                    <span class="stat-label">LAN IP</span>
                    <span class="stat-value">192.168.1.1</span>
                </div>
                <div class="stat">
                    <span class="stat-label">下载</span>
                    <span class="stat-value" id="download">-- MB/s</span>
                </div>
                <div class="stat">
                    <span class="stat-label">上传</span>
                    <span class="stat-value" id="upload">-- MB/s</span>
                </div>
            </div>
            
            <div class="card">
                <h2>📶 WiFi 状态</h2>
                <div class="stat">
                    <span class="stat-label">2.4GHz</span>
                    <span class="stat-value" id="wifi-2g">--</span>
                </div>
                <div class="stat">
                    <span class="stat-label">5GHz</span>
                    <span class="stat-value" id="wifi-5g">--</span>
                </div>
                <div class="stat">
                    <span class="stat-label">已连接设备</span>
                    <span class="stat-value" id="clients">--</span>
                </div>
            </div>
            
            <div class="card">
                <h2>🔗 已连接设备</h2>
                <table>
                    <thead>
                        <tr><th>IP</th><th>MAC</th><th>主机名</th></tr>
                    </thead>
                    <tbody id="dhcp-clients">
                        <tr><td colspan="3">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="card" style="margin-top: 20px;">
            <h2>⚡ 快捷操作</h2>
            <button class="btn" onclick="location.href='/cgi-bin/reboot.cgi'">🔄 重启</button>
            <button class="btn" onclick="location.href='/cgi-bin/wifi.cgi?toggle=1'">📶 WiFi 开关</button>
            <button class="btn" onclick="location.href='/cgi-bin/backup.cgi'">💾 备份配置</button>
            <button class="btn btn-danger" onclick="if(confirm('确定恢复出厂设置？')) location.href='/cgi-bin/factory-reset.cgi'">⚠️ 恢复出厂</button>
        </div>
    </div>
    
    <script>
        // 加载状态数据
        async function loadStats() {
            try {
                const resp = await fetch('/cgi-bin/stats.cgi');
                const data = await resp.json();
                
                document.getElementById('uptime').textContent = data.uptime;
                document.getElementById('cpu').textContent = data.cpu + '%';
                document.getElementById('cpu-bar').style.width = data.cpu + '%';
                document.getElementById('memory').textContent = data.memory;
                document.getElementById('memory-bar').style.width = data.memory_percent + '%';
                document.getElementById('wan-ip').textContent = data.wan_ip;
                document.getElementById('download').textContent = data.download;
                document.getElementById('upload').textContent = data.upload;
                document.getElementById('wifi-2g').textContent = data.wifi_2g;
                document.getElementById('wifi-5g').textContent = data.wifi_5g;
                document.getElementById('clients').textContent = data.clients;
                
                // DHCP 客户端列表
                const tbody = document.getElementById('dhcp-clients');
                tbody.innerHTML = data.dhcp_list.map(c => 
                    `<tr><td>${c.ip}</td><td>${c.mac}</td><td>${c.hostname || '--'}</td></tr>`
                ).join('') || '<tr><td colspan="3">无设备</td></tr>';
                
            } catch (e) {
                console.error('Failed to load stats:', e);
            }
        }
        
        // 每5秒刷新
        loadStats();
        setInterval(loadStats, 5000);
    </script>
</body>
</html>
