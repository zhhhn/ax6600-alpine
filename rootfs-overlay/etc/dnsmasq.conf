# DNS/DHCP configuration for JDCloud AX6600

# Interface configuration
interface=br-lan
listen-address=127.0.0.1,192.168.1.1

# DHCP range
dhcp-range=192.168.1.100,192.168.1.250,255.255.255.0,12h
dhcp-option=3,192.168.1.1
dhcp-option=6,192.168.1.1,223.5.5.5

# DNS upstream servers
server=223.5.5.5
server=223.6.6.6
server=8.8.8.8

# DNS cache
cache-size=1000
min-cache-ttl=300

# Security
bogus-priv
no-resolv
no-poll

# Domain configuration
domain=lan
expand-hosts
local=/lan/

# Lease file
dhcp-leasefile=/var/lib/misc/dnsmasq.leases

# Logging
# log-queries
# log-dhcp

# Disable DNS rebind protection for local domains
stop-dns-rebind
rebind-localhost-ok
