<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>KMS Server</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .status { margin: 20px 0; padding: 15px; border-radius: 5px; }
        .status.running { background: #d4edda; color: #155724; }
        .status.stopped { background: #f8d7da; color: #721c24; }
        .btn { padding: 10px 20px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-start { background: #28a745; color: white; }
        .btn-stop { background: #dc3545; color: white; }
        .config { margin: 20px 0; }
        .config label { display: block; margin: 10px 0 5px; }
        .config input { padding: 8px; width: 200px; }
    </style>
</head>
<body>
    <h1>⚡ KMS Server</h1>
    <p>KMS activation server for Windows and Office products</p>
    
    <div id="status" class="status stopped">Loading...</div>
    
    <div>
        <button class="btn btn-start" onclick="startService()">Start</button>
        <button class="btn btn-stop" onclick="stopService()">Stop</button>
        <button class="btn" onclick="refreshStatus()">Refresh</button>
    </div>
    
    <div class="config">
        <h3>Configuration</h3>
        <label>Port: <input type="number" id="port" value="1688"></label>
        <label>Activation Interval (seconds): <input type="number" id="interval" value="259200"></label>
        <button class="btn" onclick="saveConfig()">Save Config</button>
    </div>
    
    <div>
        <h3>KMS Commands</h3>
        <p><strong>Windows:</strong></p>
        <pre>slmgr /skms &lt;router-ip&gt;:1688
slmgr /ato</pre>
        <p><strong>Office:</strong></p>
        <pre>cscript ospp.vbs /sethst:&lt;router-ip&gt;
cscript ospp.vbs /act</pre>
    </div>
    
    <script>
        async function refreshStatus() {
            const res = await fetch('/api/clawui/apps/kms/status');
            const data = await res.json();
            const statusDiv = document.getElementById('status');
            statusDiv.className = 'status ' + (data.running ? 'running' : 'stopped');
            statusDiv.textContent = data.running ? '✓ Running on port ' + data.port : '✗ Stopped';
        }
        
        async function startService() {
            await fetch('/api/clawui/apps/kms/start', { method: 'POST' });
            refreshStatus();
        }
        
        async function stopService() {
            await fetch('/api/clawui/apps/kms/stop', { method: 'POST' });
            refreshStatus();
        }
        
        async function saveConfig() {
            const config = {
                port: document.getElementById('port').value,
                interval: document.getElementById('interval').value
            };
            await fetch('/api/clawui/apps/kms/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(config)
            });
            alert('Config saved!');
        }
        
        refreshStatus();
    </script>
</body>
</html>
