<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOCKS5 Server - ClawUI</title>
    <link rel="stylesheet" href="/css/clawui.css">
    <style>
        .interface-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            margin: 8px 0;
        }
        .interface-name {
            font-weight: 500;
            margin-bottom: 4px;
        }
        .interface-ip {
            color: var(--text-muted);
            font-size: 14px;
        }
        .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: var(--card-bg);
            border-radius: 6px;
            margin: 4px 0;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>🖥️ SOCKS5 服务端</h1>
            <p class="app-desc">SOCKS5/HTTP 代理服务</p>
        </header>

        <section class="status-section">
            <div class="status-card" id="status-card">
                <div class="status-indicator" id="status-indicator">
                    <span class="status-dot"></span>
                    <span class="status-text">检查中...</span>
                </div>
                <div class="status-details" id="status-details"></div>
            </div>
            <div class="control-buttons">
                <button class="btn btn-start" id="btn-start">启动</button>
                <button class="btn btn-stop" id="btn-stop">停止</button>
                <button class="btn btn-restart" id="btn-restart">重启</button>
                <button class="btn btn-secondary" id="btn-test">测试连接</button>
            </div>
        </section>

        <section class="config-section">
            <h2>基本配置</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>监听端口</label>
                    <input type="number" id="port" value="1080">
                </div>
                <div class="form-group">
                    <label>认证方式</label>
                    <select id="method">
                        <option value="none">无认证</option>
                        <option value="username">用户名密码</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="config-section">
            <h2>网络接口</h2>
            <p style="color: var(--text-muted); margin-bottom: 12px;">选择监听和出口接口</p>
            <div id="interfaces-list">加载中...</div>
            <div class="form-row" style="margin-top: 12px;">
                <div class="form-group">
                    <label>内部接口 (监听)</label>
                    <select id="internal">
                        <option value="0.0.0.0">所有接口 (0.0.0.0)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>外部接口 (出口)</label>
                    <select id="external">
                        <option value="eth0">eth0</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="config-section" id="auth-section" style="display:none">
            <h2>用户认证</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="new-user" placeholder="用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="new-pass" placeholder="密码">
                </div>
            </div>
            <button class="btn btn-primary" id="btn-add-user">添加用户</button>
            <div id="users-list" style="margin-top: 12px;"></div>
        </section>

        <section class="action-section">
            <button class="btn btn-primary" id="btn-save">保存配置</button>
        </section>

        <section class="config-section">
            <h2>连接信息</h2>
            <p style="color: var(--text-muted);">其他设备可通过以下方式连接:</p>
            <div class="info-box" style="background: var(--card-bg); padding: 12px; border-radius: 8px; margin-top: 8px;">
                <p><strong>SOCKS5:</strong> <code id="socks5-info">127.0.0.1:1080</code></p>
                <p><strong>HTTP:</strong> <code id="http-info">127.0.0.1:8080</code> (需额外配置)</p>
            </div>
        </section>

        <section class="logs-section">
            <h2>日志</h2>
            <div class="logs-container" id="logs-container">
                <pre id="logs-output">加载中...</pre>
            </div>
            <button class="btn btn-small" id="btn-refresh-logs">刷新日志</button>
        </section>
    </div>

    <script src="/js/clawui.js"></script>
    <script>
        const API = '/api/socks5';

        async function checkStatus() {
            try {
                const res = await fetch(`${API}/status`);
                const data = await res.json();
                const indicator = document.getElementById('status-indicator');
                const details = document.getElementById('status-details');

                if (data.running) {
                    indicator.innerHTML = '<span class="status-dot running"></span><span class="status-text">运行中</span>';
                    details.innerHTML = `
                        <p>运行时间: ${data.uptime || '-'}</p>
                        <p>监听端口: ${data.port || 1080}</p>
                        <p>当前连接: ${data.connections || 0}</p>
                    `;
                    updateConnectionInfo(data.port);
                } else {
                    indicator.innerHTML = '<span class="status-dot stopped"></span><span class="status-text">已停止</span>';
                    details.innerHTML = '<p>SOCKS5 服务未运行</p>';
                }
            } catch (e) {
                document.getElementById('status-indicator').innerHTML = '<span class="status-dot error"></span><span class="status-text">获取状态失败</span>';
            }
        }

        function updateConnectionInfo(port) {
            const hostname = window.location.hostname || '127.0.0.1';
            document.getElementById('socks5-info').textContent = `${hostname}:${port}`;
            document.getElementById('http-info').textContent = `${hostname}:${parseInt(port) + 8000}`;
        }

        async function loadInterfaces() {
            try {
                const res = await fetch(`${API}/interfaces`);
                const interfaces = await res.text();
                const lines = interfaces.split('\n').filter(l => l.trim());
                
                const list = document.getElementById('interfaces-list');
                const internalSelect = document.getElementById('internal');
                const externalSelect = document.getElementById('external');

                let html = '';
                internalSelect.innerHTML = '<option value="0.0.0.0">所有接口 (0.0.0.0)</option>';
                externalSelect.innerHTML = '';

                for (const iface of lines) {
                    const ipRes = await fetch(`${API}/get-ip/${iface}`);
                    const ip = await ipRes.text();
                    
                    html += `<div class="interface-card">
                        <div class="interface-name">${iface}</div>
                        <div class="interface-ip">${ip || '无 IP'}</div>
                    </div>`;
                    
                    if (ip) {
                        internalSelect.innerHTML += `<option value="${ip}">${iface} (${ip})</option>`;
                        externalSelect.innerHTML += `<option value="${iface}">${iface} (${ip})</option>`;
                    }
                }
                
                list.innerHTML = html;
            } catch (e) {
                document.getElementById('interfaces-list').innerHTML = '<p>加载失败</p>';
            }
        }

        async function loadUsers() {
            try {
                const res = await fetch(`${API}/users`);
                const users = await res.text();
                const list = document.getElementById('users-list');
                
                if (users.includes('No users')) {
                    list.innerHTML = '<p style="color: var(--text-muted)">暂无用户</p>';
                } else {
                    // 显示用户列表
                    list.innerHTML = '<p style="color: var(--text-muted)">用户已配置</p>';
                }
            } catch (e) {
                document.getElementById('users-list').innerHTML = '<p>加载失败</p>';
            }
        }

        async function sendAction(action) {
            try {
                const res = await fetch(`${API}/${action}`, { method: 'POST' });
                const data = await res.json();
                showToast(data.success ? '操作成功' : '操作失败', data.success ? 'success' : 'error');
                checkStatus();
            } catch (e) {
                showToast('请求失败', 'error');
            }
        }

        async function saveConfig() {
            const config = {
                port: parseInt(document.getElementById('port').value),
                internal: document.getElementById('internal').value,
                external: document.getElementById('external').value,
                method: document.getElementById('method').value
            };

            if (config.method === 'username') {
                config.user = document.getElementById('new-user').value;
                config.password = document.getElementById('new-pass').value;
                
                if (!config.user || !config.password) {
                    showToast('请填写用户名和密码', 'error');
                    return;
                }
            }

            try {
                const res = await fetch(`${API}/config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                const data = await res.json();
                showToast(data.success ? '配置已保存' : '保存失败', data.success ? 'success' : 'error');
                if (data.success) checkStatus();
            } catch (e) {
                showToast('请求失败', 'error');
            }
        }

        async function addUser() {
            const user = document.getElementById('new-user').value;
            const pass = document.getElementById('new-pass').value;
            
            if (!user || !pass) {
                showToast('请填写用户名和密码', 'error');
                return;
            }

            try {
                const res = await fetch(`${API}/add-user`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, password: pass })
                });
                const data = await res.json();
                showToast(data.message, data.success ? 'success' : 'error');
                if (data.success) {
                    document.getElementById('new-user').value = '';
                    document.getElementById('new-pass').value = '';
                    loadUsers();
                }
            } catch (e) {
                showToast('添加失败', 'error');
            }
        }

        async function testConnection() {
            showToast('正在测试...', 'info');
            try {
                const res = await fetch(`${API}/test`);
                const data = await res.json();
                showToast(data.message, data.success ? 'success' : 'error');
            } catch (e) {
                showToast('测试失败', 'error');
            }
        }

        async function loadLogs() {
            try {
                const res = await fetch(`${API}/logs/50`);
                document.getElementById('logs-output').textContent = await res.text();
            } catch (e) {
                document.getElementById('logs-output').textContent = '加载日志失败';
            }
        }

        // 事件绑定
        document.getElementById('btn-start').onclick = () => sendAction('start');
        document.getElementById('btn-stop').onclick = () => sendAction('stop');
        document.getElementById('btn-restart').onclick = () => sendAction('restart');
        document.getElementById('btn-test').onclick = testConnection;
        document.getElementById('btn-save').onclick = saveConfig;
        document.getElementById('btn-add-user').onclick = addUser;
        document.getElementById('btn-refresh-logs').onclick = loadLogs;

        document.getElementById('method').onchange = function() {
            const authSection = document.getElementById('auth-section');
            authSection.style.display = this.value === 'username' ? 'block' : 'none';
        };

        // 初始化
        checkStatus();
        loadInterfaces();
        loadUsers();
        loadLogs();
        setInterval(checkStatus, 5000);
    </script>
</body>
</html>
